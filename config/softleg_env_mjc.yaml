# PConfiguration Gymnasium environment for softleg

default : &default

  env_id     : 'Env_RILC' # environment name

  taskT      : 1.0     # task duration [s]
  stayT      : 0.0
  f_robot    : 500     # robot update frequency [Hz]
  scaling    : 10      # scaling factor of frequency (f_policy w.r.t. f_robot)
  n_ep_reset : 5       # number of episode to use in a single policy update
  n_envs     : 16      # number of environment
  n_update   : 200     # number of policy update
  le         : 0.0002
  lde        : 0.0004
  ldde       : 0.0
  kp         : 0.4
  kv         : 0.25
  chunks     : 16
  seed       : 42
  pi         : [64,64]
  vf         : [64,64]


minjerk_task : &minjerk_task
  <<: *default
  env_id   : 'Env_RILC'
  n_ep_reset : 5
  f_robot  : 100
  scaling  : 2
  n_envs   : 16
  chunks   : 16
  info     : 'multi traj with minjerk'

constrained_task : &constrained_task
  <<: *minjerk_task
  env_id   : 'Env_RILC_RANGE'
  n_envs   : 8
  n_update : 200
  chunks   : 16
  info     : '
        self.q_range_task = torch.tensor(torch.pi/3)
        rand_number = torch.rand(2,1)*2-1
        self.delta_q_task = torch.tensor([[torch.pi/2],[0]])
        self.qf = self.q_range_task*rand_number + self.delta_q_task
        for traj with minjerk'

rilc :
  <<: *minjerk_task

rl :
  <<: *minjerk_task
  env_id   : 'Env_RL'

rilc_constrained :
  <<: *constrained_task

rl_constrained :
  <<: *constrained_task
  env_id   : 'Env_RL_RANGE'

elastic_constrained_task : &elastic_constrained_task
  <<: *constrained_task
  env_id   : 'Env_RILC_RANGE_el'
  info     : '
        self.q_range_task = torch.tensor(torch.pi/3)
        rand_number = torch.rand(2,1)*2-1
        self.delta_q_task = torch.tensor([[torch.pi/2],[0]])
        self.qf = self.q_range_task*rand_number + self.delta_q_task
        for traj with minjerk - elastic'
  # le         : 0.0009
  # lde        : 0.0002
  # ldde       : 0.0
  # kp         : 0.5
  # kv         : 0.4
  kp: 1.0
  kv: 0.25
  le: 3.3e-05
  lde: 3.95e-05
  ldde: 2.28e-07
  lddde: 4.5e-07

rilc_elastic_constrained :
  <<: *elastic_constrained_task

rl_elastic_constrained :
  <<: *elastic_constrained_task
  env_id   : 'Env_RL_RANGE_el'

